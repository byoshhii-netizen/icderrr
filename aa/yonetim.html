<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>İÇDER  Yönetim Paneli</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    /* ===== RESET & BASE ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f1f8e9; color: #222; min-height: 100vh; }

    /* ===== PASSWORD GATE ===== */
    #passwordGate {
      position: fixed; inset: 0; background: linear-gradient(135deg, #1b5e20 0%, #2e7d32 50%, #388e3c 100%);
      display: flex; align-items: center; justify-content: center; z-index: 9999;
    }
    .gate-card {
      background: #fff; border-radius: 20px; padding: 48px 40px; width: 100%; max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3); text-align: center;
    }
    .gate-logo { height: 64px; margin: 0 auto 20px; }
    .gate-title { font-size: 22px; font-weight: 700; color: #1b5e20; margin-bottom: 6px; }
    .gate-sub { font-size: 14px; color: #666; margin-bottom: 32px; }
    .gate-input-wrap { position: relative; margin-bottom: 16px; }
    .gate-input-wrap i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #888; font-size: 16px; }
    .gate-input {
      width: 100%; padding: 14px 14px 14px 44px; border: 2px solid #e0e0e0; border-radius: 10px;
      font-size: 16px; outline: none; transition: border-color .2s;
    }
    .gate-input:focus { border-color: #2e7d32; }
    .gate-btn {
      width: 100%; padding: 14px; background: linear-gradient(135deg, #2e7d32, #1b5e20);
      color: #fff; border: none; border-radius: 10px; font-size: 16px; font-weight: 700;
      cursor: pointer; transition: opacity .2s; letter-spacing: .5px;
    }
    .gate-btn:hover { opacity: .9; }
    .gate-error { color: #c62828; font-size: 13px; margin-top: 10px; display: none; }

    /* ===== ADMIN PANEL ===== */
    #adminPanel { display: none; }

    /* HEADER */
    .admin-header {
      background: linear-gradient(135deg, #1b5e20 0%, #2e7d32 100%);
      color: #fff; padding: 0 24px; display: flex; align-items: center;
      justify-content: space-between; height: 68px; position: sticky; top: 0; z-index: 100;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    }
    .admin-header-left { display: flex; align-items: center; gap: 16px; }
    .admin-logo { height: 44px; filter: brightness(0) invert(1); }
    .admin-title { font-size: 20px; font-weight: 700; letter-spacing: .3px; }
    .admin-title span { font-size: 13px; font-weight: 400; opacity: .8; display: block; }
    .btn-logout {
      background: rgba(255,255,255,0.15); color: #fff; border: 1px solid rgba(255,255,255,0.3);
      padding: 8px 18px; border-radius: 8px; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: background .2s; display: flex; align-items: center; gap: 8px;
    }
    .btn-logout:hover { background: rgba(255,255,255,0.25); }

    /* MAIN CONTENT */
    .admin-main { max-width: 1400px; margin: 0 auto; padding: 28px 24px; }

    /* STATS ROW */
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px; }
    .stat-card {
      background: #fff; border-radius: 14px; padding: 20px 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07); display: flex; align-items: center; gap: 16px;
      border-left: 4px solid #2e7d32;
    }
    .stat-card.orange { border-left-color: #f57c00; }
    .stat-card.blue { border-left-color: #1565c0; }
    .stat-card.green2 { border-left-color: #00695c; }
    .stat-icon {
      width: 52px; height: 52px; border-radius: 12px; background: #e8f5e9;
      display: flex; align-items: center; justify-content: center; font-size: 22px; color: #2e7d32; flex-shrink: 0;
    }
    .stat-card.orange .stat-icon { background: #fff3e0; color: #f57c00; }
    .stat-card.blue .stat-icon { background: #e3f2fd; color: #1565c0; }
    .stat-card.green2 .stat-icon { background: #e0f2f1; color: #00695c; }
    .stat-info { flex: 1; }
    .stat-value { font-size: 28px; font-weight: 800; color: #1b5e20; line-height: 1; }
    .stat-card.orange .stat-value { color: #f57c00; }
    .stat-card.blue .stat-value { color: #1565c0; }
    .stat-card.green2 .stat-value { color: #00695c; }
    .stat-label { font-size: 13px; color: #666; margin-top: 4px; }

    /* TABS */
    .tabs-bar {
      background: #fff; border-radius: 14px; padding: 6px; display: flex; gap: 4px;
      margin-bottom: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    }
    .tab-btn {
      flex: 1; padding: 11px 16px; border-radius: 10px; font-size: 14px; font-weight: 600;
      color: #555; cursor: pointer; border: none; background: none; transition: all .2s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .tab-btn:hover { background: #e8f5e9; color: #2e7d32; }
    .tab-btn.active { background: linear-gradient(135deg, #2e7d32, #1b5e20); color: #fff; box-shadow: 0 4px 12px rgba(46,125,50,0.3); }
    .tab-badge {
      background: rgba(255,255,255,0.25); color: inherit; padding: 2px 8px;
      border-radius: 20px; font-size: 12px; font-weight: 700;
    }
    .tab-btn:not(.active) .tab-badge { background: #e8f5e9; color: #2e7d32; }

    /* FILTER BAR */
    .filter-bar {
      background: #fff; border-radius: 14px; padding: 16px 20px;
      display: flex; gap: 12px; align-items: center; margin-bottom: 20px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07); flex-wrap: wrap;
    }
    .search-wrap { position: relative; flex: 1; min-width: 200px; }
    .search-wrap i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #888; }
    .search-input {
      width: 100%; padding: 10px 12px 10px 38px; border: 2px solid #e0e0e0; border-radius: 10px;
      font-size: 14px; outline: none; transition: border-color .2s;
    }
    .search-input:focus { border-color: #2e7d32; }
    .filter-select {
      padding: 10px 14px; border: 2px solid #e0e0e0; border-radius: 10px;
      font-size: 14px; outline: none; cursor: pointer; background: #fff; transition: border-color .2s;
    }
    .filter-select:focus { border-color: #2e7d32; }
    .filter-count { font-size: 13px; color: #888; white-space: nowrap; }

    /* TABLE CARD */
    .table-card {
      background: #fff; border-radius: 14px; box-shadow: 0 2px 12px rgba(0,0,0,0.07); overflow: hidden;
    }
    .table-card-header {
      padding: 18px 24px; border-bottom: 1px solid #f0f0f0;
      display: flex; align-items: center; justify-content: space-between;
    }
    .table-card-title { font-size: 16px; font-weight: 700; color: #1b5e20; display: flex; align-items: center; gap: 8px; }
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    thead th {
      background: #f8fdf8; padding: 12px 16px; text-align: left; font-weight: 700;
      color: #1b5e20; font-size: 12px; text-transform: uppercase; letter-spacing: .5px;
      border-bottom: 2px solid #e8f5e9; white-space: nowrap;
    }
    tbody tr { border-bottom: 1px solid #f5f5f5; transition: background .15s; }
    tbody tr:hover { background: #f8fdf8; }
    tbody td { padding: 13px 16px; vertical-align: middle; }
    .td-id { font-family: monospace; font-size: 12px; color: #888; }
    .td-name { font-weight: 600; color: #1b5e20; }
    .td-phone { font-size: 13px; color: #555; }
    .td-type { }
    .td-amount { font-weight: 700; color: #1b5e20; white-space: nowrap; }
    .td-date { font-size: 12px; color: #888; white-space: nowrap; }
    .td-actions { white-space: nowrap; display: flex; gap: 6px; align-items: center; }

    /* BADGES */
    .badge {
      display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px;
      border-radius: 20px; font-size: 12px; font-weight: 700; white-space: nowrap;
    }
    .badge-bekliyor { background: #fff3e0; color: #e65100; }
    .badge-tamamlandi { background: #e8f5e9; color: #1b5e20; }
    .badge-kurban { background: #fce4ec; color: #880e4f; }
    .badge-genel { background: #e3f2fd; color: #0d47a1; }
    .badge-zekat { background: #f3e5f5; color: #4a148c; }
    .badge-fitre { background: #e0f7fa; color: #006064; }
    .badge-sadaka { background: #f9fbe7; color: #558b2f; }

    /* ACTION BUTTONS */
    .btn-action {
      padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: 600;
      cursor: pointer; border: none; transition: all .2s; display: inline-flex; align-items: center; gap: 5px;
    }
    .btn-kesildi-off { background: #f5f5f5; color: #555; border: 1px solid #ddd; }
    .btn-kesildi-off:hover { background: #e8f5e9; color: #2e7d32; border-color: #2e7d32; }
    .btn-kesildi-on { background: #e8f5e9; color: #1b5e20; border: 1px solid #a5d6a7; }
    .btn-kesildi-on:hover { background: #c8e6c9; }
    .btn-not { background: #e3f2fd; color: #1565c0; border: 1px solid #90caf9; }
    .btn-not:hover { background: #bbdefb; }
    .btn-sil { background: #ffebee; color: #c62828; border: 1px solid #ef9a9a; }
    .btn-sil:hover { background: #ffcdd2; }

    /* EMPTY STATE */
    .empty-state { text-align: center; padding: 60px 20px; color: #aaa; }
    .empty-state i { font-size: 48px; margin-bottom: 16px; display: block; }
    .empty-state p { font-size: 16px; }

    /* DONORS TAB */
    .donor-card {
      background: #fff; border-radius: 14px; padding: 20px 24px; margin-bottom: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07); border-left: 4px solid #2e7d32;
    }
    .donor-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .donor-name { font-size: 17px; font-weight: 700; color: #1b5e20; display: flex; align-items: center; gap: 10px; }
    .donor-meta { font-size: 13px; color: #666; display: flex; gap: 16px; flex-wrap: wrap; }
    .donor-meta span { display: flex; align-items: center; gap: 5px; }
    .donor-donations { margin-top: 12px; }
    .donor-donation-row {
      display: flex; align-items: center; gap: 12px; padding: 8px 12px;
      background: #f8fdf8; border-radius: 8px; margin-bottom: 6px; font-size: 13px;
    }
    .donor-total { font-size: 15px; font-weight: 700; color: #1b5e20; }

    /* NOTE MODAL */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000;
      display: flex; align-items: center; justify-content: center; padding: 20px;
      opacity: 0; pointer-events: none; transition: opacity .2s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal-box {
      background: #fff; border-radius: 20px; padding: 32px; width: 100%; max-width: 520px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2); transform: translateY(20px); transition: transform .2s;
    }
    .modal-overlay.open .modal-box { transform: translateY(0); }
    .modal-title { font-size: 18px; font-weight: 700; color: #1b5e20; margin-bottom: 6px; display: flex; align-items: center; gap: 10px; }
    .modal-sub { font-size: 13px; color: #888; margin-bottom: 24px; }
    .modal-label { font-size: 13px; font-weight: 600; color: #444; margin-bottom: 6px; display: block; }
    .modal-textarea {
      width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 10px;
      font-size: 14px; font-family: inherit; resize: vertical; min-height: 90px;
      outline: none; transition: border-color .2s; margin-bottom: 16px;
    }
    .modal-textarea:focus { border-color: #2e7d32; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
    .btn-modal-cancel {
      padding: 10px 20px; border-radius: 10px; font-size: 14px; font-weight: 600;
      background: #f5f5f5; color: #555; border: none; cursor: pointer; transition: background .2s;
    }
    .btn-modal-cancel:hover { background: #e0e0e0; }
    .btn-modal-save {
      padding: 10px 24px; border-radius: 10px; font-size: 14px; font-weight: 700;
      background: linear-gradient(135deg, #2e7d32, #1b5e20); color: #fff; border: none;
      cursor: pointer; transition: opacity .2s; display: flex; align-items: center; gap: 8px;
    }
    .btn-modal-save:hover { opacity: .9; }

    /* TOAST */
    .toast {
      position: fixed; bottom: 28px; right: 28px; background: #1b5e20; color: #fff;
      padding: 14px 22px; border-radius: 12px; font-size: 14px; font-weight: 600;
      box-shadow: 0 8px 24px rgba(0,0,0,0.2); z-index: 9999;
      transform: translateY(80px); opacity: 0; transition: all .3s; display: flex; align-items: center; gap: 10px;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.error { background: #c62828; }

    /* RESPONSIVE */
    @media (max-width: 900px) {
      .stats-row { grid-template-columns: repeat(2, 1fr); }
      .admin-main { padding: 16px 12px; }
    }
    @media (max-width: 600px) {
      .stats-row { grid-template-columns: 1fr 1fr; }
      .admin-header { padding: 0 14px; }
      .admin-title { font-size: 16px; }
      .tabs-bar { flex-wrap: wrap; }
    }
    @media (max-width: 480px) {
      .stats-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- PASSWORD GATE -->
  <div id="passwordGate">
    <div class="gate-card">
      <div style="width:72px;height:72px;background:#e8f5e9;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:30px;color:#2e7d32;">
        <i class="fa fa-shield-halved"></i>
      </div>
      <h2 class="gate-title">Yönetim Paneli</h2>
      <p class="gate-sub">Şifreyi girin</p>
      <div class="gate-input-wrap">
        <i class="fa fa-lock"></i>
        <input type="password" id="passwordInput" class="gate-input" placeholder="Şifre" />
      </div>
      <button class="gate-btn" onclick="checkPassword()">Giriş Yap</button>
      <div class="gate-error" id="gateError">Yanlış şifre!</div>
    </div>
  </div>

  <!-- ADMIN PANEL -->
  <div id="adminPanel">
    <!-- HEADER -->
    <header class="admin-header">
      <div class="admin-header-left">
        <div class="admin-title">
          İÇDER YÖNETİM PANELİ
          <span>Bağış & Kullanıcı Yönetimi</span>
        </div>
      </div>
      <div style="display:flex;gap:12px;align-items:center;">
        <a href="/" style="color:rgba(255,255,255,.8);font-size:14px;text-decoration:none;display:flex;align-items:center;gap:6px;">
          <i class="fa fa-home"></i> Siteye Dön
        </a>
        <button class="btn-logout" onclick="logout()">
          <i class="fa fa-sign-out-alt"></i> Çıkış
        </button>
      </div>
    </header>

    <!-- MAIN CONTENT -->
    <main class="admin-main">
      <!-- STATS ROW -->
      <div class="stats-row" id="statsRow"></div>

      <!-- TABS -->
      <div class="tabs-bar">
        <button class="tab-btn active" data-tab="tumBagislar" onclick="switchTab('tumBagislar')">
          <i class="fa fa-list"></i> Tüm Bağışlar
        </button>
        <button class="tab-btn" data-tab="kurbanlar" onclick="switchTab('kurbanlar')">
          <i class="fa fa-cow"></i> Kurban Bağışları
          <span class="tab-badge" id="kurbanBadge">0</span>
        </button>
        <button class="tab-btn" data-tab="kullanicilar" onclick="switchTab('kullanicilar')">
          <i class="fa fa-users"></i> Bağışçılar
        </button>
        <button class="tab-btn" data-tab="ayarlar" onclick="switchTab('ayarlar')">
          <i class="fa fa-cog"></i> Site Ayarları
        </button>
      </div>

      <!-- TAB CONTENT -->
      <div id="tabContent"></div>
    </main>
  </div>

  <!-- NOTE MODAL -->
  <div class="modal-overlay" id="noteModal">
    <div class="modal-box">
      <h3 class="modal-title"><i class="fa fa-sticky-note"></i> Not Ekle / Düzenle</h3>
      <p class="modal-sub">Bağışçının göreceği not ve yönetici notu ekleyin</p>
      <label class="modal-label">Bağışçı Notu (Görünür)</label>
      <textarea class="modal-textarea" id="modalNotText" placeholder="Kurbanınız kesilmiştir. Allah kabul etsin."></textarea>
      <label class="modal-label">Yönetici Notu (Sadece yönetici görür)</label>
      <textarea class="modal-textarea" id="modalEkNot" placeholder="İç not..."></textarea>
      <div class="modal-actions">
        <button class="btn-modal-cancel" onclick="closeNoteModal()">İptal</button>
        <button class="btn-modal-save" onclick="saveNote()"><i class="fa fa-check"></i> Kaydet</button>
      </div>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <!-- SCRIPTS -->
  <script src="js/bagis-db.js"></script>
  <script src="js/site-config.js"></script>
  <script>
    const ADMIN_PASSWORD = 'icder2026';
    let currentTab = 'tumBagislar';
    let currentNoteId = null;

    // ===== PASSWORD GATE =====
    function checkPassword() {
      const input = document.getElementById('passwordInput');
      const error = document.getElementById('gateError');
      if (input.value === ADMIN_PASSWORD) {
        sessionStorage.setItem('icder_admin_auth', '1');
        document.getElementById('passwordGate').style.display = 'none';
        document.getElementById('adminPanel').style.display = 'block';
        loadDashboard();
      } else {
        error.style.display = 'block';
        input.value = '';
        setTimeout(() => error.style.display = 'none', 3000);
      }
    }

    function logout() {
      sessionStorage.removeItem('icder_admin_auth');
      location.reload();
    }

    // Enter key support
    document.addEventListener('DOMContentLoaded', () => {
      const pwInput = document.getElementById('passwordInput');
      if (pwInput) {
        pwInput.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') checkPassword();
        });
        pwInput.focus();
      }
    });

    // ===== INIT =====
    if (sessionStorage.getItem('icder_admin_auth') === '1') {
      document.getElementById('passwordGate').style.display = 'none';
      document.getElementById('adminPanel').style.display = 'block';
      loadDashboard();
    }

    // ===== DASHBOARD =====
    async function loadDashboard() {
      const bagislar = await BagisDB.hepsiniGetir();
      const kurbanlar = bagislar.filter(b => (b.tur||'').includes('Kurban') || (b.baslik||'').includes('Kurban'));
      const bekleyen = kurbanlar.filter(b => b.durum === 'bekliyor').length;
      const toplam = bagislar.reduce((s, b) => s + Number(b.tutar || 0), 0);

      document.getElementById('statsRow').innerHTML = `
        <div class="stat-card">
          <div class="stat-icon"><i class="fa fa-hand-holding-heart"></i></div>
          <div class="stat-info">
            <div class="stat-value">${bagislar.length}</div>
            <div class="stat-label">Toplam Bağış</div>
          </div>
        </div>
        <div class="stat-card blue">
          <div class="stat-icon"><i class="fa fa-lira-sign"></i></div>
          <div class="stat-info">
            <div class="stat-value">${toplam.toLocaleString('tr-TR')} ₺</div>
            <div class="stat-label">Toplam Tutar</div>
          </div>
        </div>
        <div class="stat-card green2">
          <div class="stat-icon"><i class="fa fa-cow"></i></div>
          <div class="stat-info">
            <div class="stat-value">${kurbanlar.length}</div>
            <div class="stat-label">Kurban Bağışı</div>
          </div>
        </div>
        <div class="stat-card orange">
          <div class="stat-icon"><i class="fa fa-clock"></i></div>
          <div class="stat-info">
            <div class="stat-value">${bekleyen}</div>
            <div class="stat-label">Bekleyen Kurban</div>
          </div>
        </div>
      `;

      document.getElementById('kurbanBadge').textContent = bekleyen;
      switchTab(currentTab);
    }

    // ===== TAB SWITCH =====
    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      document.querySelector(`[data-tab="${tab}"]`).classList.add('active');

      if (tab === 'tumBagislar') renderTumBagislar();
      else if (tab === 'kurbanlar') renderKurbanlar();
      else if (tab === 'kullanicilar') renderKullanicilar();
      else if (tab === 'ayarlar') renderAyarlar();
    }

    // ===== TÜM BAĞIŞLAR =====
    async function renderTumBagislar() {
      const bagislar = await BagisDB.hepsiniGetir();
      const sorted = bagislar.slice().reverse();

      if (!sorted.length) {
        document.getElementById('tabContent').innerHTML = `
          <div class="empty-state">
            <i class="fa fa-inbox"></i>
            <p>Henüz bağış yok</p>
          </div>
        `;
        return;
      }

      const rows = sorted.map(b => `
        <tr>
          <td class="td-id">${b.id}</td>
          <td class="td-name">${b.ad || ''} ${b.soyad || ''}<br><small style="color:#888;">${b.kullaniciAdi || '-'}</small></td>
          <td class="td-phone">${b.tel || '-'}</td>
          <td>${getBadge(b.tur)}</td>
          <td>${b.baslik || '-'}</td>
          <td class="td-amount">${Number(b.tutar || 0).toLocaleString('tr-TR')} ₺</td>
          <td class="td-date">${new Date(b.tarih).toLocaleString('tr-TR')}</td>
          <td>${getDurumBadge(b.durum)}</td>
        </tr>
      `).join('');

      document.getElementById('tabContent').innerHTML = `
        <div class="table-card">
          <div class="table-card-header">
            <div class="table-card-title"><i class="fa fa-list"></i> Tüm Bağışlar (${sorted.length})</div>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Ad Soyad</th>
                  <th>Telefon</th>
                  <th>Tür</th>
                  <th>Başlık</th>
                  <th>Tutar</th>
                  <th>Tarih</th>
                  <th>Durum</th>
                </tr>
              </thead>
              <tbody>${rows}</tbody>
            </table>
          </div>
        </div>
      `;
    }

    // ===== KURBAN BAĞIŞLARI =====
    async function renderKurbanlar() {
      const bagislar = await BagisDB.hepsiniGetir();
      const kurbanlar = bagislar.filter(b => (b.tur||'').includes('Kurban') || (b.baslik||'').includes('Kurban')).reverse();

      if (!kurbanlar.length) {
        document.getElementById('tabContent').innerHTML = `
          <div class="empty-state">
            <i class="fa fa-cow"></i>
            <p>Henüz kurban bağışı yok</p>
          </div>
        `;
        return;
      }

      const rows = kurbanlar.map(b => `
        <tr id="row-${b.id}">
          <td class="td-id">${b.id}</td>
          <td class="td-name">${b.ad || ''} ${b.soyad || ''}</td>
          <td class="td-phone">${b.tel || '-'}</td>
          <td>${b.baslik || b.tur || '-'}</td>
          <td class="td-amount">${Number(b.tutar || 0).toLocaleString('tr-TR')} ₺</td>
          <td class="td-date">${new Date(b.tarih).toLocaleString('tr-TR')}</td>
          <td id="durum-${b.id}">${getDurumBadge(b.durum)}</td>
          <td style="max-width:200px;font-size:12px;color:#666;">${(b.not || '').substring(0, 50)}</td>
          <td class="td-actions">
            ${b.durum === 'bekliyor' 
              ? `<button class="btn-action btn-kesildi-off" onclick="toggleDurum('${b.id}', 'tamamlandi')"><i class="fa fa-check"></i> Kesildi</button>`
              : `<button class="btn-action btn-kesildi-on" onclick="toggleDurum('${b.id}', 'bekliyor')"><i class="fa fa-clock"></i> Bekliyor</button>`
            }
            <button class="btn-action btn-not" onclick="openNoteModal('${b.id}')"><i class="fa fa-sticky-note"></i> Not</button>
          </td>
        </tr>
      `).join('');

      document.getElementById('tabContent').innerHTML = `
        <div style="background:#fff8e1;border-left:4px solid #f57c00;padding:16px;border-radius:12px;margin-bottom:20px;font-size:14px;color:#555;">
          <i class="fa fa-info-circle"></i> Kurban bağışlarını buradan yönetin. Durum değiştirince bağışçı anında görür.
        </div>
        <div class="table-card">
          <div class="table-card-header">
            <div class="table-card-title"><i class="fa fa-cow"></i> Kurban Bağışları (${kurbanlar.length})</div>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Ad Soyad</th>
                  <th>Telefon</th>
                  <th>Tür</th>
                  <th>Tutar</th>
                  <th>Tarih</th>
                  <th>Durum</th>
                  <th>Not</th>
                  <th>İşlem</th>
                </tr>
              </thead>
              <tbody>${rows}</tbody>
            </table>
          </div>
        </div>
      `;
    }

    // ===== KULLANICILAR =====
    async function renderKullanicilar() {
      const users = await BagisDB.kullanicilariGetir();
      const bagislar = await BagisDB.hepsiniGetir();

      if (!users.length) {
        document.getElementById('tabContent').innerHTML = `
          <div class="empty-state">
            <i class="fa fa-users"></i>
            <p>Henüz kayıtlı bağışçı yok</p>
          </div>
        `;
        return;
      }

      const rows = users.map(u => {
        const ub = bagislar.filter(b => b.kullaniciAdi === u.kullaniciAdi);
        const toplam = ub.reduce((s, b) => s + Number(b.tutar || 0), 0);
        return `
          <tr>
            <td class="td-name">${u.kullaniciAdi}</td>
            <td>${u.ad || ''} ${u.soyad || ''}</td>
            <td class="td-phone">${u.tel || '-'}</td>
            <td>${u.email || '-'}</td>
            <td class="td-date">${new Date(u.kayitTarihi).toLocaleDateString('tr-TR')}</td>
            <td style="text-align:center;font-weight:700;">${ub.length}</td>
            <td class="td-amount">${toplam.toLocaleString('tr-TR')} ₺</td>
          </tr>
        `;
      }).join('');

      document.getElementById('tabContent').innerHTML = `
        <div class="table-card">
          <div class="table-card-header">
            <div class="table-card-title"><i class="fa fa-users"></i> Bağışçılar (${users.length})</div>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Kullanıcı Adı</th>
                  <th>Ad Soyad</th>
                  <th>Telefon</th>
                  <th>E-posta</th>
                  <th>Kayıt Tarihi</th>
                  <th>Bağış Sayısı</th>
                  <th>Toplam Tutar</th>
                </tr>
              </thead>
              <tbody>${rows}</tbody>
            </table>
          </div>
        </div>
      `;
    }

    // ===== AYARLAR =====
    async function renderAyarlar() {
      const cfg = await SiteConfig.getFromServer();

      document.getElementById('tabContent').innerHTML = `
        <div style="max-width:800px;">
          <div class="table-card" style="margin-bottom:20px;">
            <div class="table-card-header">
              <div class="table-card-title"><i class="fa fa-phone"></i> İletişim Bilgileri</div>
            </div>
            <div style="padding:24px;">
              ${inputField('telefon', 'Telefon', cfg.telefon)}
              ${inputField('whatsapp', 'WhatsApp (ülke koduyla)', cfg.whatsapp)}
              ${inputField('email', 'E-posta', cfg.email)}
              ${inputField('adres', 'Adres', cfg.adres)}
            </div>
          </div>

          <div class="table-card" style="margin-bottom:20px;">
            <div class="table-card-header">
              <div class="table-card-title"><i class="fa fa-share-alt"></i> Sosyal Medya</div>
            </div>
            <div style="padding:24px;">
              ${inputField('facebook', 'Facebook URL', cfg.facebook)}
              ${inputField('twitter', 'X (Twitter) URL', cfg.twitter)}
              ${inputField('instagram', 'Instagram URL', cfg.instagram)}
              ${inputField('youtube', 'YouTube URL', cfg.youtube)}
            </div>
          </div>

          <button class="btn-modal-save" onclick="saveSettings()" style="padding:14px 32px;font-size:15px;">
            <i class="fa fa-save"></i> Ayarları Kaydet
          </button>
        </div>
      `;
    }

    function inputField(id, label, value) {
      return `
        <div style="margin-bottom:16px;">
          <label style="display:block;font-size:13px;font-weight:600;color:#555;margin-bottom:6px;">${label}</label>
          <input type="text" id="cfg_${id}" value="${value || ''}" 
            style="width:100%;padding:12px 14px;border:2px solid #e0e0e0;border-radius:10px;font-size:14px;outline:none;transition:border-color .2s;"
            onfocus="this.style.borderColor='#2e7d32'" onblur="this.style.borderColor='#e0e0e0'" />
        </div>
      `;
    }

    async function saveSettings() {
      const fields = ['telefon', 'whatsapp', 'email', 'adres', 'facebook', 'twitter', 'instagram', 'youtube'];
      const config = {};
      fields.forEach(f => {
        const el = document.getElementById('cfg_' + f);
        if (el) config[f] = el.value.trim();
      });
      await SiteConfig.save(config);
      showToast('Ayarlar kaydedildi!');
    }

    // ===== DURUM DEĞİŞTİR =====
    async function toggleDurum(id, yeniDurum) {
      const not = yeniDurum === 'tamamlandi'
        ? 'Kurbanınız kesilmiştir. Allah kabul etsin.'
        : 'Kurban kesim işleminiz devam etmekte.';
      await BagisDB.guncelle(id, { durum: yeniDurum, not });
      showToast('Durum güncellendi!');
      loadDashboard();
    }

    // ===== NOT MODAL =====
    function openNoteModal(id) {
      currentNoteId = id;
      BagisDB.hepsiniGetir().then(bagislar => {
        const b = bagislar.find(x => x.id === id);
        if (b) {
          document.getElementById('modalNotText').value = b.not || '';
          document.getElementById('modalEkNot').value = b.ekNot || '';
          document.getElementById('noteModal').classList.add('open');
        }
      });
    }

    function closeNoteModal() {
      document.getElementById('noteModal').classList.remove('open');
      currentNoteId = null;
    }

    async function saveNote() {
      if (!currentNoteId) return;
      const not = document.getElementById('modalNotText').value.trim();
      const ekNot = document.getElementById('modalEkNot').value.trim();
      await BagisDB.guncelle(currentNoteId, { not, ekNot });
      closeNoteModal();
      showToast('Not kaydedildi!');
      if (currentTab === 'kurbanlar') renderKurbanlar();
    }

    // Close modal on overlay click
    document.getElementById('noteModal').addEventListener('click', (e) => {
      if (e.target.id === 'noteModal') closeNoteModal();
    });

    // ===== HELPERS =====
    function getBadge(tur) {
      if (!tur) return '<span class="badge badge-genel">Genel</span>';
      if (tur.includes('Kurban')) return '<span class="badge badge-kurban">Kurban</span>';
      if (tur.includes('Zekat')) return '<span class="badge badge-zekat">Zekat</span>';
      if (tur.includes('Fitre')) return '<span class="badge badge-fitre">Fitre</span>';
      if (tur.includes('Sadaka')) return '<span class="badge badge-sadaka">Sadaka</span>';
      return '<span class="badge badge-genel">'+tur+'</span>';
    }

    function getDurumBadge(durum) {
      if (durum === 'tamamlandi') return '<span class="badge badge-tamamlandi"><i class="fa fa-check-circle"></i> Kesildi</span>';
      return '<span class="badge badge-bekliyor"><i class="fa fa-clock"></i> Bekliyor</span>';
    }

    function showToast(msg, isError = false) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.className = 'toast show' + (isError ? ' error' : '');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }
  </script>

</body>
</html>
