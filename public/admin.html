<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Admin Paneli - İÇDER Kurban</title>
  <link rel="stylesheet" href="style.css"/>
  <link rel="stylesheet" href="fa/css/all.min.css"/>
</head>
<body>

<div class="topbar">
  <div class="topbar-brand">
    <div class="logo-icon">
      <i class="fa-solid fa-shield-halved" style="color:var(--red)"></i>
    </div>
    <div class="brand-text">Admin Paneli <span>İÇDER Kurban</span></div>
  </div>
  <div class="topbar-right">
    <div class="topbar-badge"><i class="fa-solid fa-user-shield" style="color:var(--red);margin-right:5px"></i>Yönetici</div>
    <button class="btn btn-danger btn-sm" onclick="adminCikis()" title="Çıkış Yap" style="margin-left:8px">
      <i class="fa-solid fa-right-from-bracket"></i> Çıkış
    </button>
    <div class="topbar-dot" title="Admin aktif" style="background:var(--red)"></div>
  </div>
</div>

<div class="layout">
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-logo-area">
      <div class="org-name">Admin Paneli</div>
      <div class="org-sub">Tüm Sistem Yönetimi</div>
    </div>

    <div class="sidebar-section">Sistem</div>
    <div class="sidebar-item active" data-page="dashboard" onclick="showAdminPage('dashboard')">
      <i class="fa-solid fa-gauge"></i> Dashboard
    </div>
    <div class="sidebar-item" data-page="sistem-modu" onclick="showAdminPage('sistem-modu')">
      <i class="fa-solid fa-power-off"></i> Sistem Modu
    </div>

    <div class="sidebar-section">Kullanıcılar</div>
    <div class="sidebar-item" data-page="organizasyonlar" onclick="showAdminPage('organizasyonlar')">
      <i class="fa-solid fa-layer-group"></i> Tüm Organizasyonlar
    </div>
    <div class="sidebar-item" data-page="kurbanlar" onclick="showAdminPage('kurbanlar')">
      <i class="fa-solid fa-cow"></i> Tüm Kurbanlar
    </div>
    <div class="sidebar-item" data-page="medya" onclick="showAdminPage('medya')">
      <i class="fa-solid fa-photo-film"></i> Tüm Medya
    </div>

    <div class="sidebar-section">Destek</div>
    <div class="sidebar-item" data-page="talepler" onclick="showAdminPage('talepler')">
      <i class="fa-solid fa-headset"></i> Destek Talepleri
      <span id="talep-badge" class="badge badge-red" style="margin-left:auto;display:none">0</span>
    </div>

    <div class="sidebar-section">Ayarlar</div>
    <div class="sidebar-item" data-page="sifreler" onclick="showAdminPage('sifreler')">
      <i class="fa-solid fa-key"></i> Şifre Yönetimi
    </div>
  </nav>

  <main class="main" id="main-content"></main>
</div>

<div class="footer">İÇDER Admin Paneli &nbsp;&mdash;&nbsp; Tüm Haklar Saklıdır</div>
<div class="toast-container" id="toast-container"></div>

<div class="modal-overlay hidden" id="modal-overlay" onclick="closeModalOutside(event)">
  <div class="modal" id="modal-box">
    <div class="modal-header">
      <span class="modal-title" id="modal-title"></span>
      <button class="modal-close" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<script src="admin-app.js"></script>
</body>
</html>
